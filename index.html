<!-- Buttons für den manuellen Klick -->
    <a href="#" id="openAppBtn" class="btn">Im Spiel öffnen</a><br>
    
    <a href="market://details?id=com.stefftronn.tictactopple" class="btn btn-store">Zum Google Play Store</a>

    <script>
        var appUrl = "tictactopple://open" + window.location.search;
        document.getElementById("openAppBtn").href = appUrl;

        // Versuch der automatischen Weiterleitung in dein Spiel
        window.location.href = appUrl;

        // Wenn wir nach 2,5 Sekunden noch auf der Seite sind, ab zum Play Store
        setTimeout(function() {
            if(document.hasFocus()) {
                // market:// zwingt Android, die Play Store App zu öffnen
                window.location.href = "market://details?id=com.stefftronn.tictactopple";
            }
        }, 2500);
    </script>
</body>
</html>
